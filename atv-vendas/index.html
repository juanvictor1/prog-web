<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Vendas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>Cadastro de Vendas</h1>
        
        <div class="form-container">
            <input type="text" id="vendedor" placeholder="Nome do vendedor">
            <input type="number" id="valor" placeholder="Valor da venda">
            <button onclick="cadastrarVenda()">Cadastrar</button>
        </div>

        <h2>Lista de Vendas</h2>
        
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Vendedor</th>
                    <th>Valor</th>
                    <th>Desconto</th>
                    <th>Valor Final</th>
                    <th>Data</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-vendas">
                <!--JS-->
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
